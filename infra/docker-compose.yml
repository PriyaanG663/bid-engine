services:
  # 1. DATABASE
  auction-db: 
    image: postgres:15
    container_name: auction_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auction_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d auction_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. CACHE
  auction-redis:
    image: redis:7
    container_name: auction_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. JAVA IDENTITY SERVICE
  identity-service:
    build: ../services/identity-java
    container_name: identity_java
    ports:
      - "9090:9090"
    depends_on:
      auction-db:
        condition: service_healthy # Waits for DB to be fully ready
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auction-db:5432/auction_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password

  # 4. GO BIDDING ENGINE
  bidding-engine:
    build: ../services/bidding-go
    container_name: bidding_go
    ports:
      - "8080:8080"
    depends_on:
      auction-redis:
        condition: service_healthy # Fixes the "no healthcheck configured" error
      identity-service:
        condition: service_started