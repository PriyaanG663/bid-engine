syntax = "proto3";

package identity;

option java_multiple_files = true;
option java_package = "com.auction.identity.grpc";
option java_outer_classname = "IdentityProto";
option go_package = "bidding-go/proto";

service IdentityService {
  rpc Signup (SignupRequest) returns (AuthResponse);
  rpc Login (LoginRequest) returns (AuthResponse);
  rpc GetBalance (BalanceRequest) returns (BalanceResponse);
  rpc UpdateBalance (UpdateBalanceRequest) returns (BalanceResponse);
}

message SignupRequest {
  string username = 1;
  string password = 2;
  double initial_balance = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message AuthResponse {
  bool success = 1;
  string message = 2;
  double balance = 3;
  string username = 4;
}

message BalanceRequest { string username = 1; }
message BalanceResponse { 
  double balance = 1; 
  bool exists = 2; 
}

message UpdateBalanceRequest {
  string username = 1;
  double amount = 2; // Use positive to add, negative to subtract
}