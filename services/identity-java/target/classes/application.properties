server.port=8081

# The 'serverTimezone=UTC' is the most important part here
spring.datasource.url=jdbc:postgresql://localhost:5432/auction_db?serverTimezone=UTC&options=-c%20timezone=UTC
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Tells Hibernate to create tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect